name: maahvi
description: A new Flutter project for Lottery Web.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  go_router: ^12.0.0
  razorpay_flutter: ^1.3.5
  url_launcher: ^6.2.1
  intl: ^0.18.1
  share_plus: ^7.2.2 
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#C62828"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
